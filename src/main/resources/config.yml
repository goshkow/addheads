# AddHeads configuration
#
# Supported integrations:
# - chat: decorates final chat components generated by other plugins
# - placeholder: exposes PlaceholderAPI formats for TAB and similar plugins
#
# Language:
# - Set language.file to one of the files inside plugins/AddHeads/languages/.
# - Default bundled files are en-us.yml and ru-ru.yml.
#
# Premium mode:
# - premium.mode can be:
#   - auto       -> detect premium players by their UUID/session
#   - permission -> detect premium players by premium.permission
#   - limboauth  -> try the LimboAuth/LimboAUF premium API first, then fall back to auto detection
# - In auto mode, AddHeads treats a player as premium when the player uses an online-mode UUID.
# - On online-mode servers this means every player is premium.
# - On mixed/offline-mode setups this works with login systems that assign premium players their online UUIDs.
# - If a player is detected as premium, the defaults below are applied unless the player overrides them with
#   /hd togglechat or /hd toggletab.
#
# TAB / prefix usage:
# - AddHeads does not inject heads into tab by itself anymore.
# - To display heads in TAB, LuckPerms prefixes, or similar plugins,
#   explicitly insert one of the placeholders below into that plugin's config.
# - In TAB, the safest default is %addhead_tab% placed before the prefix or directly inside the prefix.
# - The placeholder can also be used in LuckPerms prefixes or any other plugin that supports PlaceholderAPI.
# - If your TAB setup does not render head object components correctly, check TAB's component settings.
#   According to TAB's official wiki, TAB player head components are not compatible with components.minimessage-support=true.
#   For %addhead_tab%, set components.minimessage-support: false in TAB.
#
# Available placeholder formats:
# - %addhead_head%                -> JSON component head
# - %addhead_tab%                 -> TAB-compatible signed head with trailing space when visible
# - %addhead_texture_value%       -> raw texture value
# - %addhead_texture_signature%   -> raw texture signature
# - %addhead_texture_hash%        -> textures.minecraft.net hash
# - %addhead_skin_ready%          -> true/false, reports whether the shared cache already has a confirmed skin
# - %addhead_tab_visible%         -> true/false, reports whether tab head output is enabled for that player
#
# Strict TAB behavior:
# - %addhead_tab% now returns an empty string until the shared cache has a confirmed skin.
# - This avoids rendering the wrong or fallback head while the skin is still loading.
#
# Skin refresh:
# - Cached skin data is refreshed for online players on the interval below.
# - Additional delayed refreshes are triggered on join and after chat messages to catch late skin updates.
# - Use /hd settings or the admin reload command after editing the config when you want to change this live.
chat: true
placeholder: true
skin-refresh-interval-seconds: 20
language:
  file: en-us.yml
messages:
  prefix: "&b[AddHeads] &r"
premium:
  enabled: false
  mode: auto
  # auto       -> detect premium players from their session/UUID
  # permission -> detect premium players by premium.permission
  permission: addhead.premium
  disable-chat-heads: false
  disable-tab-heads: true

