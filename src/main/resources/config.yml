# AddHeads
# Author: goshkow

# Main features.
chat: true
placeholder: true

# Skin refresh interval, in seconds.
skin-refresh-interval-seconds: 20

# Head spacing.
formatting:
  # Keep enabled unless you want the head to touch chat text.
  chat-head-space: true
  # Keep enabled unless you want TAB output to look cramped.
  tab-head-space: true

# Language file from plugins/AddHeads/languages/.
language:
  file: en-us.yml

# Prefix used in plugin messages.
messages:
  prefix: "&b[AddHeads] &r"

# Update checker.
update-check:
  enabled: true
  interval-hours: 6
  github:
    # owner/repo or a GitHub releases URL.
    repository: goshkow/addheads
    url: https://github.com/goshkow/addheads/releases/latest
  modrinth:
    # project slug or a Modrinth versions URL.
    project: addheads
    url: https://modrinth.com/plugin/addheads/versions

# Premium defaults.
premium:
  enabled: false
  # auto -> session/UUID, permission -> premium.permission, limboauth -> LimboAuth/LimboAUF first.
  mode: auto
  permission: addhead.premium
  disable-chat-heads: false
  disable-tab-heads: true

# General notes.
# - %addhead_head% is for chat and component-aware plugins.
# - %addhead_tab% is for TAB and similar PlaceholderAPI-aware plugins.
# - TAB player head components require components.minimessage-support: false.
# - AddHeads does not inject heads into tab automatically; insert the placeholder in the target plugin.
# - Missing config keys are backfilled from the bundled template on reload.
# - Update notices are sent in English to admins with addhead.settings or addhead.reload.
