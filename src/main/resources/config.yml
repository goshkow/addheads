# AddHeads
# Author: goshkow

# Main features.
chat: true
placeholder: true

# Default TAB head injection.
# Keep this enabled if you want AddHeads to prepend the head automatically to the player list name.
tab:
  enabled: true
  # Default: 20 seconds. Lower values reapply the head more often if another plugin rewrites the list name.
  refresh-interval-seconds: 20

# Skin refresh interval, in seconds.
skin-refresh-interval-seconds: 20

# Head spacing.
formatting:
  # Keep enabled unless you want the head to touch chat text.
  chat-head-space: true
  # Keep enabled unless you want TAB output to look cramped.
  tab-head-space: true

# Language file from plugins/AddHeads/languages/.
language:
  file: en-us.yml

# Prefix used in plugin messages.
messages:
  prefix: "&b[AddHeads] &r"

# Update checker.
update-check:
  enabled: true
  interval-hours: 6
  github:
    # owner/repo or a GitHub releases URL.
    repository: goshkow/addheads
    url: https://github.com/goshkow/addheads/releases/latest
  modrinth:
    # project slug or a Modrinth versions URL.
    project: addheads
    url: https://modrinth.com/plugin/addheads/versions

# Premium defaults.
premium:
  enabled: false
  # auto -> session/UUID, permission -> premium.permission, limboauth -> LimboAuth/LimboAUF first.
  mode: auto
  permission: addhead.premium
  disable-chat-heads: false
  disable-tab-heads: true

# General notes.
# - tab.enabled controls the automatic player-list head injection.
# - tab.refresh-interval-seconds keeps the head visible if another plugin rewrites the list name later.
# - %addhead_head% is for chat and component-aware plugins.
# - %addhead_tab% is optional and mainly useful for custom PlaceholderAPI-based layouts.
# - The default tab head path does not require placeholders; it uses Paper's playerListName(Component) API.
# - Missing config keys are backfilled from the bundled template on reload.
# - Update notices are sent in English to admins with addhead.settings or addhead.reload.
