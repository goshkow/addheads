name: AddHeads
main: goshkow.addhead.AddHeads
version: 1.1.0
api-version: "1.21"
description: |
  AddHeads
  A plugin that adds player heads to chat, the in-game player list, and exposes a reusable head API.
  Author: goshkow (c) 2026
  Works on Purpur/Paper 1.21.11+.
softdepend: [PlaceholderAPI, SkinsRestorer]
commands:
  addhead:
    description: AddHeads command
    aliases: [hd]
    usage: /hd <togglechat|toggletab|settings|info|reload|update>
permissions:
  addhead.settings:
    description: Allows opening AddHeads settings GUI
    default: op
  addhead.reload:
    description: Allows reloading AddHeads configuration and skin cache
    default: op
  addhead.togglechat:
    description: Allows toggling your own chat heads
    default: true
  addhead.toggletab:
    description: Allows toggling your own tab heads
    default: true
  addhead.premium:
    description: Used when premium.mode checks permissions
    default: false
